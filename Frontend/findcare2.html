  <!--js-->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const dropdownToggle = document.querySelector('.dropdown-toggle');
      const dropdownMenu = document.querySelector('.dropdown-menu');

      dropdownToggle.addEventListener('click', function (e) {
        e.stopPropagation();
        dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
      });

      // Close dropdown when clicking outside
      document.addEventListener('click', function () {
        dropdownMenu.style.display = 'none';
      });
    });
  </script>

  <body>
    <h1>Hospitals Offering Sickle Cell Services</h1>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search hospitals...">
    </div>

    <div id="hospitalList">
      <!-- Hospitals will be loaded dynamically -->
    </div>
    <script>
      async function loadHospitals(search = '') {
        const hospitalList = document.getElementById('hospitalList');
        hospitalList.innerHTML = '<div class="loading">Loading hospitals...</div>';

        try {
          const response = await fetch(`https://sickle-care-connect.onrender.com/hospitals?search=${encodeURIComponent(search)}`);
          const hospitals = await response.json();

          hospitalList.innerHTML = '';

          if (hospitals.length === 0) {
            hospitalList.innerHTML = '<p>No hospitals found.</p>';
            return;
          }

          hospitals.forEach(hospital => {
            const card = document.createElement('div');
            card.className = 'hospital-card';

            const doctorsHtml = hospital.doctors.length > 0
              ? hospital.doctors.map(doc => `<div><strong>Doctor:</strong> ${doc.name} (${doc.specialization})</div>`).join('')
              : '<div><strong>Doctor:</strong> No doctors assigned</div>';

            card.innerHTML = `
              <h2><i class="fa-solid fa-hospital icon"></i>${hospital.name}</h2>
              <p><strong>City:</strong> <span class="city">${hospital.city}</span></p>
              <p><strong>Location:</strong> ${hospital.location}</p>
              <p><strong>Service:</strong> ${hospital.service}</p>
              <p><strong>Notes:</strong> ${hospital.notes || ''}</p>
              ${doctorsHtml}
              <a href="book appointment.html?hospital=${encodeURIComponent(hospital.name)}&doctor=${encodeURIComponent(hospital.doctors[0]?.name || '')}&doctor_id=${hospital.first_doctor_id || ''}" class="booking">Book Appointment</a>
            `;

            hospitalList.appendChild(card);
          });
        } catch (error) {
          hospitalList.innerHTML = '<div class="error-message">Error loading hospitals</div>';
          console.error('Error loading hospitals:', error);
        }
      }

      function searchHospital() {
        const input = document.getElementById("searchInput").value;
        loadHospitals(input);
      }

      // Load hospitals on page load
      document.addEventListener('DOMContentLoaded', function () {
        loadHospitals();
        // Add live search
        document.getElementById("searchInput").addEventListener('input', function () {
          searchHospital();
        });
      });
    </script>
    <script src="navigation.js"></script>

  </body>

</html>
