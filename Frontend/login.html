<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sickle Care Connect</title>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header class="navbar">
        <img src="images/sicklecare logo.jpeg" alt="Logo" width="300px" height="110px">

        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html" class="link">Home</a></li>

                <!--about SCD-->
                <li class="nav-items dropdown">
                    <span class="link dropdown-toggle">About SCD ▾</span>

                    <ul class="dropdown-menu">
                        <li><a href="aboutSCD.html" class="link">What is SCD?</a></li>
                        <li><a href="symptoms.html" class="link">Symptoms</a></li>
                        <li><a href="causes.html" class="link">Causes</a></li>
                        <li><a href="treatment.html" class="link">Treatment</a></li>
                    </ul>
                </li>
                <li><a href="findcare2.html" class="link">Find Care</a></li>

            </ul>
        </nav>
    </header>

    <!--js-->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const dropdownToggle = document.querySelector('.dropdown-toggle');
            const dropdownMenu = document.querySelector('.dropdown-menu');

            dropdownToggle.addEventListener('click', function (e) {
                e.stopPropagation();
                dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', function () {
                dropdownMenu.style.display = 'none';
            });
        });
    </script>
    <div class="auth-container">
        <div class="auth-card">
            <form id="loginForm" class="signin-form">
                <h2><i class="fa-solid fa-user"></i> Login</h2>

                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>

                <button type="submit" class="btn-primary">Login</button>
                <div class="spinner" id="loginSpinner"></div>
                <p class="login-text">
                    Do not have an account? <a href="sign in.html">Register here</a>
                </p>
            </form>
        </div>
    </div>
    <script src="session.js"></script>
    <script src="login.js"></script>
</body>

</html>
